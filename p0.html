<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제이노트 전자책 - 1페이지 표지 (디자인 표준화 최종본)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        /* 🚀 인쇄 시 배경색 및 디자인 강제 유지를 위한 절대 설정 (2페이지와 동일) */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            box-sizing: border-box !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #d4d4d8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        /* A4 규격 고정 */
        .page {
            width: 210mm;
            height: 297mm;
            background-color: #1a1a1b !important;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white !important;
            padding: 60px 55px; /* 표지는 상단 여백을 조금 더 줌 */
        }

        /* 텍스처: 인쇄 시 오류 방지를 위해 미세하게 조절 */
        .texture {
            position: absolute;
            inset: 0;
            opacity: 0.02 !important;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        }

        .neon-text { color: #ccff00 !important; }
        .neon-bg { background-color: #ccff00 !important; }

        /* 표지 전용 데코레이션 */
        .neon-line {
            position: absolute;
            top: 0;
            right: 80px;
            width: 2px;
            height: 200px;
            background: linear-gradient(to bottom, #ccff00, transparent) !important;
        }

        /* BEFORE 스펙 박스 */
        .spec-box {
            background-color: #242426 !important;
            border: 1px solid #333333 !important;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .spec-tag {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333333 !important;
            color: #a1a1aa !important;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 12px;
            border-radius: 4px;
            letter-spacing: 2px;
        }

        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            body { background: none !important; padding: 0 !important; margin: 0 !important; }
            .page { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 210mm !important; 
                height: 297mm !important; 
                background-color: #1a1a1b !important;
            }
            .no-print { display: none !important; }
            .texture { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="page" id="page-1">
        <div class="texture"></div>
        <div class="neon-line"></div>

        <!-- Top: Badge -->
        <div class="relative z-10 flex flex-col items-center mt-10 mb-16">
            <div class="inline-block px-6 py-2 neon-bg text-black text-[14px] font-black tracking-[0.3em] uppercase rounded-full">
                비전공자 역전의 아이콘
            </div>
        </div>

        <!-- Middle: Main Catchphrase -->
        <div class="relative z-10 text-center flex flex-col items-center flex-1 justify-center">
            <p class="text-[18px] font-bold text-zinc-500 mb-6 tracking-tight">
                고교 9등급, 사회복지 학점은행제, 20대 후반 직업군인 전역...
            </p>

            <h1 class="font-black tracking-tighter mb-16 flex flex-col items-center gap-2">
                <span class="text-[54px] text-white leading-[1.1]">"이 스펙으로 대체 어떻게</span>
                <span class="text-[54px] leading-[1.1]">대기업 <span class="neon-text underline decoration-8 underline-offset-8">
                    [개발자]
                </span>가 되었을까?"</span>
            </h1>

            <!-- BEFORE Spec Boxes (2페이지 디자인 계승) -->
            <div class="grid grid-cols-2 gap-6 w-full max-w-lg mb-16">
                <div class="spec-box">
                    <span class="spec-tag">BEFORE 01</span>
                    <p class="text-[16px] font-bold text-zinc-200">고교 9등급 <span class="mx-2 opacity-20">|</span> 학점은행제</p>
                </div>
                <div class="spec-box">
                    <span class="spec-tag">BEFORE 02</span>
                    <p class="text-[16px] font-bold text-zinc-200">직업군인 <span class="mx-2 opacity-20">|</span> 제조업 물경력</p>
                </div>
            </div>

            <!-- Main Solution Highlight -->
            <div class="w-full max-w-xl">
                <div class="border-4 border-[#ccff00] px-10 py-8 transform -rotate-2 bg-[#1a1a1b] shadow-2xl relative">
                    <!-- Decorative Corner -->
                    <div class="absolute -top-4 -right-4 w-12 h-12 border-t-4 border-r-4 border-[#ccff00]"></div>
                    
                    <p class="text-[32px] font-black text-white tracking-tighter flex items-center justify-center gap-4">
                        <i class="fa-solid fa-bolt neon-text"></i>
                        비전공자 [이력서 작성 기술]
                    </p>
                </div>
                <p class="text-zinc-400 mt-8 text-[18px] font-medium tracking-tight">
                    "당신은 늦은 게 아니라, 가치를 증명할 <span class="text-white font-bold border-b border-zinc-600">'언어'</span>가 없는 것입니다."
                </p>
            </div>
        </div>

        <!-- Bottom: Author & Footer (2페이지와 완벽 통일) -->
        <div class="relative z-10 flex flex-col mt-auto pt-8">
            <div class="flex justify-between items-end pt-4" style="border-top: 1px solid #333333 !important;">
                <div class="flex flex-col">
                    <span class="text-[12px] font-bold neon-text tracking-[0.4em] uppercase mb-2">[검증된 성공 공식]</span>
                    <span class="text-3xl font-black tracking-tighter italic text-white/90">
                        제이노트(J-Note) <span class="text-[12px] font-light not-italic opacity-40 ml-2">출판</span>
                    </span>
                </div>
                <div class="text-right flex flex-col items-end">
                    <div class="flex gap-1 mb-2">
                        <div class="w-1.5 h-4 neon-bg"></div>
                        <div class="w-1.5 h-4 neon-bg"></div>
                        <div class="w-1.5 h-4 neon-bg"></div>
                        <div class="w-1.5 h-4 neon-bg"></div>
                        <div class="w-1.5 h-4 neon-bg"></div>
                    </div>
                    <span class="text-[12px] font-mono opacity-30 tracking-widest uppercase">Release Ver. 2026.02</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fixed bottom-8 right-8 no-print">
        <button onclick="window.print()" class="neon-bg text-black px-8 py-4 rounded-full font-black shadow-2xl hover:scale-110 transition-transform flex items-center gap-3">
            <i class="fa-solid fa-file-pdf text-xl"></i>
            <span>PDF로 저장하기</span>
        </button>
    </div>

</body>
</html>
