<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자책 이동 | JNOTE LIBRARY</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const book = params.get("book");
        const target = book
            ? `./book.html?book=${encodeURIComponent(book)}&read=1`
            : "./library.html";
        window.location.replace(target);
    </script>
    <p><a href="./library.html">전자책 책장으로 이동</a></p>
</body>
</html>
